services:
  - type: web
    name: conciliacao-app
    runtime: docker
    plan: starter
    region: oregon
    autoDeployTrigger: commit
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: conciliacao-app.onrender.com
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
    disk:
      name: conciliacao-tmp
      mountPath: /rails/tmp/conciliacao
      sizeGB: 1

  - type: web
    name: conciliacao-app-staging
    runtime: docker
    plan: starter
    region: oregon
    branch: staging
    autoDeployTrigger: commit
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: debug
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: conciliacao-app-staging.onrender.com
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: TMP_CLEANUP_TTL_HOURS
        value: "1"
    disk:
      name: conciliacao-tmp-staging
      mountPath: /rails/tmp/conciliacao
      sizeGB: 1
